<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Carolina Vilela</title>
  <link rel="stylesheet" href="css/design-system.css?v=2">
  <style>
    .contact-main {
      padding: var(--sp-10) var(--sp-6);
      border-bottom: 1px solid var(--border);
      min-height: 420px;
    }
    .contact-email {
      display: inline-block;
      margin-top: var(--sp-4);
      transition: opacity 0.15s ease;
    }
    .contact-email:hover { opacity: 0.75; }
    .contact-links {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      margin-top: var(--sp-8);
      padding-top: var(--sp-6);
      border-top: 1px solid var(--border);
      max-width: 320px;
    }
    .contact-links a {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      transition: color 0.15s ease;
    }
    .contact-links a:hover { color: var(--ink); }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">Carolina Vilela</a>
    <div class="nav-links">
      <a href="index.html#work">Work</a>
      <a href="index.html#experience">Experience</a>
      <a href="about.html" class="is-temporarily-hidden">About</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <main class="contact-main">
    <span class="t-label">Contact</span>
    <a href="mailto:cvilelams@gmail.com" class="contact-email t-section-headline">
      cvilelams@gmail.com
    </a>
    <p class="t-body" style="margin-top: var(--sp-4); max-width: 400px;">
      Open to product design roles and select freelance projects.
      Usually reply within 48 hours.
    </p>
    <nav class="contact-links" aria-label="External links">
      <a href="https://www.linkedin.com/in/carolinavilelams/" target="_blank" rel="noopener noreferrer">LinkedIn →</a>
    </nav>
  </main>

  <footer class="footer">
    <span class="footer-copy">© 2026 Carolina Vilela</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
    </div>
  </footer>

</body>
</html>
